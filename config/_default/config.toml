baseURL = "https://krafttraining.online/"
languageCode = "de"
title = "Krafttraining Ratgeber — Funktionelles Training mit System"
theme = "hugo-theme-stack"
paginate = 12
defaultContentLanguage = "de"

[languages]
  [languages.de]
    languageName = "Deutsch"
    weight = 1

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"
    lineNos = false

[taxonomies]
  tag = "tags"
  category = "categories"
  prinzip = "prinzipien"

[related]
  includeNewer = true
  threshold = 80
  toLower = true
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "categories"
    weight = 80
  [[related.indices]]
    name = "prinzipien"
    weight = 60
